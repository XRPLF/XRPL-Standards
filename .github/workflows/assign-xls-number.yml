name: Assign XLS Number

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: assign-xls-number-${{ github.repository }}
  cancel-in-progress: false

jobs:
  check-self-assigned-number:
    runs-on: ubuntu-latest
    name: Warn About Self-Assigned XLS Numbers
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Get added numbered XLS files
        id: added-numbered
        uses: tj-actions/changed-files@v47
        with:
          use_rest_api: true
          files: |
            XLS-[0-9][0-9][0-9][0-9]-*/README.md
            xls-[0-9][0-9][0-9][0-9]-*/README.md

      - name: Check for self-assigned numbers above 95
        id: check-self-assigned
        if: steps.added-numbered.outputs.added_files != ''
        uses: actions/github-script@v9
        with:
          script: |
            // If the PR already has the "has-xls-number" label, CI assigned the
            // number so a numbered directory is expected — skip the warning.
            const labels = context.payload.pull_request.labels || [];
            if (labels.some(l => l.name === 'has-xls-number')) {
              console.log('PR has "has-xls-number" label — skipping self-assigned check.');
              core.setOutput('has_self_assigned', 'false');
              return;
            }

            const addedFiles = `${{ steps.added-numbered.outputs.added_files }}`.trim();
            if (!addedFiles) {
              core.setOutput('has_self_assigned', 'false');
              return;
            }

            const pattern = /^[Xx][Ll][Ss]-(\d{4})-[^/]+\/README\.md$/;
            const selfAssigned = [];

            for (const file of addedFiles.split(' ')) {
              const match = file.match(pattern);
              if (match) {
                const num = parseInt(match[1], 10);
                if (num > 95) {
                  selfAssigned.push({ file, number: num });
                }
              }
            }

            if (selfAssigned.length === 0) {
              console.log('No self-assigned XLS numbers > 95 found.');
              core.setOutput('has_self_assigned', 'false');
              return;
            }

            console.log(`Found ${selfAssigned.length} self-assigned XLS number(s) > 95:`);
            for (const entry of selfAssigned) {
              console.log(`  ${entry.file} (XLS-${entry.number})`);
            }

            core.setOutput('has_self_assigned', 'true');

            const rows = selfAssigned.map(e =>
              `| \`${e.file.split('/')[0]}\` | ${e.number} |`
            ).join('\n');

            core.setOutput('warning_table', rows);

      - name: Check for existing warning comment
        if: steps.check-self-assigned.outputs.has_self_assigned == 'true'
        id: find-warning-comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "Self-Assigned XLS Number Warning"

      - name: Post warning comment
        if: steps.check-self-assigned.outputs.has_self_assigned == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-warning-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## ⚠️ Self-Assigned XLS Number Warning

            This PR adds a new XLS directory with a **self-assigned number**. XLS numbers should be assigned by the CI system using the `XLS-draft-*` naming convention.

            | Directory | Self-Assigned Number |
            |-----------|---------------------|
            ${{ steps.check-self-assigned.outputs.warning_table }}

            ### What to do

            Please rename your directory to use the draft convention instead (e.g., `XLS-draft-my-feature`). An XLS number will be automatically assigned after a maintainer approves the PR.

            ---
            *This warning was automatically generated.*

  check-approval:
    runs-on: ubuntu-latest
    name: Check for Write+ Approval
    outputs:
      has_write_approval: ${{ steps.check-approval.outputs.has_write_approval }}
    steps:
      - name: Check for write+ approval
        id: check-approval
        uses: actions/github-script@v9
        with:
          script: |
            core.setOutput('has_write_approval', 'false');

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            // Get only approved reviews
            const approvals = reviews.filter(review => review.state === 'APPROVED');

            // Check each approver's permission level
            for (const approval of approvals) {
              const user = approval.user;

              // Skip approvals without a valid user (e.g., deleted accounts)
              if (!user || !user.login) {
                console.log('Skipping approval with missing user information');
                continue;
              }

              // Skip bot approvals
              if (user.type === 'Bot' || user.login.endsWith('[bot]')) {
                console.log(`Skipping bot approval from ${user.login}`);
                continue;
              }

              const { data: permissionLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: user.login
              });

              const permission = permissionLevel.permission;
              if (['write', 'admin', 'maintain'].includes(permission)) {
                console.log(`Found write+ approval from ${user.login} (${permission})`);
                core.setOutput('has_write_approval', 'true');
                return;
              }
            }

            console.log('No write+ approval found');
            core.setOutput('has_write_approval', 'false');

  assign-xls-number:
    runs-on: ubuntu-latest
    name: Assign XLS Number to Draft
    needs: check-approval
    if: needs.check-approval.outputs.has_write_approval == 'true'
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout script from base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          sparse-checkout: |
            .github/scripts/assign_xls_number.py
          sparse-checkout-cone-mode: false
          path: base-repo

      - name: Get added files
        id: added-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            XLS-draft*/README.md
            xls-draft*/README.md
          # Only look at added files, not modified ones
          include_all_old_new_renamed_files: false

      - name: Check for draft XLS files
        id: check-drafts
        run: |
          ADDED_FILES="${{ steps.added-files.outputs.added_files }}"
          echo $ADDED_FILES
          if [ -z "$ADDED_FILES" ]; then
            echo "No XLS draft files added in this PR"
            echo "has_drafts=false" >> $GITHUB_OUTPUT
          else
            echo "Found draft XLS files: $ADDED_FILES"
            echo "has_drafts=true" >> $GITHUB_OUTPUT
            echo "draft_files=$ADDED_FILES" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check-drafts.outputs.has_drafts == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Assign XLS number
        if: steps.check-drafts.outputs.has_drafts == 'true'
        id: assign-number
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: |
          echo ${{ steps.check-drafts.outputs.draft_files }}
          python base-repo/.github/scripts/assign_xls_number.py ${{ steps.check-drafts.outputs.draft_files }}

      - name: Check for existing assignment comment
        if: steps.check-drafts.outputs.has_drafts == 'true'
        id: find-comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "XLS Number Assignment"

      - name: Post or update PR comment
        if: steps.check-drafts.outputs.has_drafts == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body: |
            ## 🎫 XLS Number Assignment

            This PR adds a new XLS draft. The next available XLS number has been determined:

            | Draft Directory | Assigned Number | New Directory Name |
            |-----------------|-----------------|-------------------|
            | `${{ steps.assign-number.outputs.draft_dir }}` | **XLS-${{ steps.assign-number.outputs.xls_number }}** | `${{ steps.assign-number.outputs.new_dir_name }}` |

            ### Next Steps for XLS Editors

            Before merging this PR, please:

            1. **Rename the directory** from `${{ steps.assign-number.outputs.draft_dir }}` to `${{ steps.assign-number.outputs.new_dir_name }}`
            2. **Update the preamble** in the README.md:
               - Set `xls:` to `${{ steps.assign-number.outputs.xls_number }}`
               - Set `status:` to `Draft`

            ---
            *This comment was automatically generated. The XLS number below is reserved for this PR based on existing XLS numbers in the repository and other open draft PRs.*

            <!-- XLS_NUMBER:${{ steps.assign-number.outputs.xls_number }} -->

      - name: Add has-xls-number label
        if: steps.check-drafts.outputs.has_drafts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -X POST \
            -d '{"labels":["has-xls-number"]}' \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels"
